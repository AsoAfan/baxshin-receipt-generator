<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Receipt Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ url_for('static', filename='icon-192.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
  <meta name="theme-color" content="#0cb09b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
</head>
<body>
  <main class="page page-form">
    <section class="form-card">
      <header class="hero">
        <p class="eyebrow">Offline</p>
        <h1>You're Offline</h1>
        <p class="sub">The page you're looking for is not available right now.</p>
      </header>

      <div style="margin-top: 2rem; padding: 1rem; background: #fff3cd; border-radius: 11px; border: 1px solid #ffc107;">
        <p style="margin: 0; color: #856404; font-weight: 600;">✓ Good news!</p>
        <p style="margin: 0.5rem 0 0; color: #856404;">You can still:</p>
        <ul style="margin: 0.5rem 0 0; padding-left: 1.5rem; color: #856404;">
          <li>Create new receipts</li>
          <li>Add customers</li>
          <li>Add items</li>
          <li>View cached data</li>
        </ul>
        <p style="margin: 0.5rem 0 0; color: #856404; font-size: 0.9rem;">All changes will sync when you're back online.</p>
      </div>

      <div class="actions" style="margin-top: 2rem;">
        <a class="button primary" href="{{ url_for('index') }}">Try Again</a>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
